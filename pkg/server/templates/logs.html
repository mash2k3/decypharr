{{ define "logs" }}
<style>
#log-viewer {
    background: #0d0d0d;
    color: #c9d1d9;
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.5;
    height: calc(100vh - 220px);
    min-height: 400px;
    overflow-y: auto;
    overflow-x: auto;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--color-base-300, #2a2a2a);
    white-space: pre;
}
.log-line { display: block; padding: 1px 0; }
.log-line:hover { background: rgba(255,255,255,0.04); }
.log-ts { color: #6e7681; }
.log-level-info  { color: #3fb950; font-weight: 600; }
.log-level-warn  { color: #d29922; font-weight: 600; }
.log-level-error { color: #f85149; font-weight: 600; }
.log-level-debug { color: #58a6ff; font-weight: 600; }
.log-level-fatal { color: #ff7b72; font-weight: 600; }
.log-component { color: #e8601c; }
.log-msg { color: #c9d1d9; }
.chip-active { border-color: #e8601c !important; background: rgba(232,96,28,0.15) !important; color: #e8601c !important; }
#log-controls { gap: 8px; flex-wrap: wrap; }
#scroll-bottom-btn { display: none; }
</style>

<div class="space-y-3">
    <!-- Controls bar -->
    <div id="log-controls" class="flex items-center">
        <select id="level-select" class="select select-sm select-bordered w-32">
            <option value="all">All Levels</option>
            <option value="debug">Debug</option>
            <option value="info">Info</option>
            <option value="warn">Warn</option>
            <option value="error">Error</option>
        </select>

        <select id="lines-select" class="select select-sm select-bordered w-32">
            <option value="500">500 lines</option>
            <option value="1000">1000 lines</option>
            <option value="2000" selected>2000 lines</option>
            <option value="5000">5000 lines</option>
        </select>

        <input id="filter-input" type="text" placeholder="Filter logs..."
               class="input input-sm input-bordered flex-1 min-w-32 max-w-xs">

        <div id="chip-bar" class="flex flex-wrap gap-1"></div>

        <div class="flex items-center gap-2 ml-auto">
            <span id="log-status" class="text-xs opacity-60"></span>
            <label class="flex items-center gap-1 text-xs cursor-pointer">
                <input type="checkbox" id="auto-scroll-toggle" class="checkbox checkbox-xs checkbox-primary" checked>
                Auto-scroll
            </label>
            <button id="scroll-bottom-btn" class="btn btn-xs btn-ghost" title="Scroll to bottom">
                <i class="bi bi-arrow-down-circle"></i>
            </button>
            <button id="refresh-btn" class="btn btn-xs btn-outline btn-primary" title="Refresh now">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
    </div>

    <!-- Log viewer -->
    <div id="log-viewer"></div>
</div>

<script src="{{.URLBase}}assets/js/logs.js"></script>
{{ end }}
