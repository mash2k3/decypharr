name: Dev Build

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  packages: write

env:
  GHCR_IMAGE: ghcr.io/mash2k3/decypharr
  LDFLAGS_PKG: github.com/sirrobot01/decypharr/pkg/version

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      dev_version: ${{ steps.meta.outputs.dev_version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Calculate dev version
        id: meta
        run: |
          LATEST_TAG=$(git tag | grep -v 'beta' | sort -V | tail -n1)
          IFS='.' read -r -a VERSION_PARTS <<< "${LATEST_TAG:-0.0.0}"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"
          NEW_PATCH=$((PATCH + 1))
          DEV_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}-dev"
          echo "dev_version=${DEV_VERSION}" >> $GITHUB_OUTPUT

  build-linux:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: amd64
            cc: gcc
            cxx: g++
          - arch: arm64
            cc: zig cc -target aarch64-linux-gnu
            cxx: zig c++ -target aarch64-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Install Zig
        if: matrix.arch == 'arm64'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1
      - name: Install libfuse-dev
        run: sudo apt-get update && sudo apt-get install -y libfuse-dev
      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          VERSION: ${{ needs.prepare.outputs.dev_version }}
          CHANNEL: dev
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X ${LDFLAGS_PKG}.Version=${VERSION} -X ${LDFLAGS_PKG}.Channel=${CHANNEL}" \
            -o dist/decypharr
      - name: Package
        run: |
          ARCH="${{ matrix.arch }}"
          [ "$ARCH" = "amd64" ] && ARCH="x86_64"
          tar czf "dist/decypharr_Linux_${ARCH}.tar.gz" -C dist decypharr
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/decypharr_Linux_*.tar.gz
          retention-days: 7

  build-windows:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64
          VERSION: ${{ needs.prepare.outputs.dev_version }}
          CHANNEL: dev
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X ${LDFLAGS_PKG}.Version=${VERSION} -X ${LDFLAGS_PKG}.Channel=${CHANNEL}" \
            -o dist/decypharr.exe
      - name: Package
        working-directory: dist
        run: zip decypharr_Windows_x86_64.zip decypharr.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/decypharr_Windows_x86_64.zip
          retention-days: 7

  build-darwin:
    runs-on: macos-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: amd64
            label: x86_64
          - arch: arm64
            label: arm64
    steps:
      - uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Install macFUSE headers
        run: brew install macfuse
      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.prepare.outputs.dev_version }}
          CHANNEL: dev
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X ${LDFLAGS_PKG}.Version=${VERSION} -X ${LDFLAGS_PKG}.Channel=${CHANNEL}" \
            -o dist/decypharr
      - name: Package
        run: tar czf "dist/decypharr_Darwin_${{ matrix.label }}.tar.gz" -C dist decypharr
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.arch }}
          path: dist/decypharr_Darwin_*.tar.gz
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
      - uses: actions/checkout@v5
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build_ghcr
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.dev_version }}
            CHANNEL=dev
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=build-${{ env.PLATFORM_PAIR }},mode=max
          outputs: type=image,name=${{ env.GHCR_IMAGE }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests/ghcr
          ghcr_digest="${{ steps.build_ghcr.outputs.digest }}"
          touch "/tmp/digests/ghcr/${ghcr_digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-ghcr-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/ghcr/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/ghcr
          pattern: digests-ghcr-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest and push
        working-directory: /tmp/digests/ghcr
        run: |
          docker buildx imagetools create \
            --tag ${{ env.GHCR_IMAGE }}:dev \
            $(printf '${{ env.GHCR_IMAGE }}@sha256:%s ' *)

  release:
    runs-on: ubuntu-latest
    needs: [ prepare, build-linux, build-windows, build-darwin ]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Download linux-amd64
        uses: actions/download-artifact@v4
        with:
          name: linux-amd64
          path: dist
      - name: Download linux-arm64
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64
          path: dist
      - name: Download windows-amd64
        uses: actions/download-artifact@v4
        with:
          name: windows-amd64
          path: dist
      - name: Download darwin-amd64
        uses: actions/download-artifact@v4
        with:
          name: darwin-amd64
          path: dist
      - name: Download darwin-arm64
        uses: actions/download-artifact@v4
        with:
          name: darwin-arm64
          path: dist
      - name: Create or update dev release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.dev_version }}
        run: |
          if gh release view "dev" &>/dev/null; then
            gh release upload "dev" dist/* --clobber
          else
            gh release create "dev" dist/* \
              --title "decypharr dev" \
              --prerelease \
              --notes "Latest dev build from the dev branch."
          fi
